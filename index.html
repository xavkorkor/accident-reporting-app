<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accident Sketch Generator - Sketch Plan & Statement</title>
  <link rel="stylesheet" href="style.css?v=7" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <main class="app">
    <aside class="left">
      <section>
        <h2>1. ACCIDENT STATEMENT</h2>
        <textarea id="statement" maxlength="20000" rows="13"></textarea>
        <div id="counter" class="counter">0 / 20000</div>
        <button id="generateBtn" class="primary">Generate Sketch Plan & Statement</button>
      </section>
      <section>
        <h2>2. EXTRACTED DETAILS</h2>
        <div id="details" class="details"></div>
        <button id="applyBtn" class="purple">Apply Edited Details to Diagram + Statement</button>
      </section>
      <section>
        <h2>3. EXPORT</h2>
        <button id="exportAllBtn" class="green">Export Sketch Plan & Statement PDF</button>
        <button id="exportPage1Btn" class="white">Export Page 1 Diagram PNG</button>
        <button id="exportPage2Btn" class="white">Export Page 2 Statement PDF</button>
      </section>
      <section class="dev-panel">
        <h2>DEVELOPER / STRESS TEST</h2>
        <p class="hint">Keeps rear-end role detection smart without cluttering the report workflow.</p>
        <button id="runSmartTestsBtn" class="white">Run Smart Rear-End Tests</button>
        <div id="smartTestResults" class="smart-results">No smart tests run yet.</div>
      </section>
    </aside>
    <section class="right">
      <div class="preview-grid">
        <div><h3>Page 1 - Sketch Plan</h3><div id="page1" class="page sketch-page official-page actual-form"><canvas id="formPage1" class="form-bg"></canvas><div class="diagram-box"><canvas id="diagramCanvas" width="1000" height="320"></canvas></div></div></div>
        <div><h3>Page 2 - Statement</h3><div id="page2" class="page statement-page official-page actual-form"><canvas id="formPage2" class="form-bg"></canvas><div id="statementLayer" class="statement-layer"></div></div></div>
      </div>
    </section>
  </main>
  <div id="exportBundle" class="export-bundle"></div>
  <script src="v7-logic.js?v=2"></script>
  <script src="app.js?v=17"></script>
  <script>
    function compactVehicle(ctx, label, plate, x, y) {
      ctx.save(); ctx.strokeStyle = '#111'; ctx.fillStyle = '#fff'; ctx.lineWidth = 3;
      var r = 10, w = 52, h = 78;
      ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
      ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
      ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.fill(); ctx.stroke();
      ctx.strokeRect(x+11, y+9, 30, 11); ctx.strokeRect(x+11, y+58, 30, 11);
      ctx.fillStyle = '#111'; ctx.font = 'bold 24px Arial'; ctx.fillText(label, x+18, y+46);
      ctx.font = '9px Arial'; if (plate) ctx.fillText(plate, x-5, y+h+14); ctx.restore();
    }
    function v7LanePlan(d) {
      var p = String(d.lane_position || '').toLowerCase().trim();
      var explicit = parseInt(d.road_lane_count, 10);
      var mentionedLane = p.indexOf('left') >= 0 || p.indexOf('right') >= 0 || p.indexOf('middle') >= 0 || p.indexOf('centre') >= 0 || p.indexOf('center') >= 0;
      var lanes = 1;
      var laneIndex = 0;
      if (p.indexOf('middle') >= 0 || p.indexOf('centre') >= 0 || p.indexOf('center') >= 0) { lanes = 3; laneIndex = 1; }
      else if (p.indexOf('left') >= 0) { lanes = 2; laneIndex = 0; }
      else if (p.indexOf('right') >= 0) { lanes = 2; laneIndex = 1; }
      else if (explicit >= 2 && explicit <= 5 && mentionedLane) { lanes = explicit; laneIndex = Math.floor(lanes / 2); }
      return { lanes: lanes, laneIndex: laneIndex, laneText: mentionedLane ? d.lane_position : '' };
    }
    renderDiagram = function (d) {
      var c = document.getElementById('diagramCanvas'); if (!c) return;
      c.width = 1000; c.height = 320;
      var ctx = c.getContext('2d'); ctx.clearRect(0, 0, c.width, c.height);
      var plan = v7LanePlan(d);
      var n = plan.lanes;
      var roadW = Math.min(300, n * 92);
      var left = 500 - roadW / 2;
      var top = 62, bottom = 260, laneW = roadW / n;
      ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(left, top); ctx.lineTo(left, bottom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(left + roadW, top); ctx.lineTo(left + roadW, bottom); ctx.stroke();
      ctx.strokeStyle = '#777'; ctx.lineWidth = 2; ctx.setLineDash([14, 18]);
      for (var i = 1; i < n; i++) { var lx = left + laneW * i; ctx.beginPath(); ctx.moveTo(lx, top); ctx.lineTo(lx, bottom); ctx.stroke(); }
      ctx.setLineDash([]);
      var x = left + laneW * (plan.laneIndex + 0.5) - 26;
      ctx.fillStyle = '#111'; ctx.font = 'bold 18px Arial'; ctx.fillText('Traffic Flow ↑', 40, 42);
      ctx.font = '13px Arial';
      ctx.fillText(n + ' lane' + (n > 1 ? 's' : '') + (plan.laneText ? ' - ' + plan.laneText + ' lane' : ''), 40, 62);
      var front = d.front_vehicle || 'A', rear = d.rear_vehicle || 'B';
      compactVehicle(ctx, front, plateFor(front, d), x, 72);
      compactVehicle(ctx, rear, plateFor(rear, d), x, 178);
      ctx.fillStyle = '#111'; ctx.font = 'bold 26px Arial'; ctx.fillText('X', x + 17, 170);
    };
    window.addEventListener('load', function () {
      if (typeof renderAll === 'function') renderAll();
      if (!window.pdfjsLib) return;
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      window.pdfjsLib.getDocument('sketch-plan.pdf').promise.then(function (pdf) {
        function renderFormPage(pageNo, canvasId) {
          return pdf.getPage(pageNo).then(function (page) {
            var canvas = document.getElementById(canvasId); if (!canvas) return;
            var viewport = page.getViewport({ scale: 2 }); canvas.width = viewport.width; canvas.height = viewport.height;
            var ctx = canvas.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            return page.render({ canvasContext: ctx, viewport: viewport }).promise;
          });
        }
        renderFormPage(1, 'formPage1'); renderFormPage(2, 'formPage2');
      }).catch(function () { document.querySelectorAll('.actual-form').forEach(function (page) { page.classList.add('missing-form'); }); });
    });
  </script>
</body>
</html>
