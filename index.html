<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accident Sketch Generator - Sketch Plan & Statement</title>
  <link rel="stylesheet" href="style.css?v=6" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <main class="app">
    <aside class="left">
      <section>
        <h2>1. ACCIDENT STATEMENT</h2>
        <textarea id="statement" maxlength="20000" rows="13"></textarea>
        <div id="counter" class="counter">0 / 20000</div>
        <button id="generateBtn" class="primary">Generate Sketch Plan & Statement</button>
      </section>
      <section>
        <h2>2. EXTRACTED DETAILS</h2>
        <div id="details" class="details"></div>
        <button id="applyBtn" class="purple">Apply Edited Details to Diagram + Statement</button>
      </section>
      <section>
        <h2>3. EXPORT</h2>
        <button id="exportAllBtn" class="green">Export Sketch Plan & Statement PDF</button>
        <button id="exportPage1Btn" class="white">Export Page 1 Diagram PNG</button>
        <button id="exportPage2Btn" class="white">Export Page 2 Statement PDF</button>
      </section>
      <section class="dev-panel">
        <h2>DEVELOPER / STRESS TEST</h2>
        <p class="hint">Keeps rear-end role detection smart without cluttering the report workflow.</p>
        <button id="runSmartTestsBtn" class="white">Run Smart Rear-End Tests</button>
        <div id="smartTestResults" class="smart-results">No smart tests run yet.</div>
      </section>
    </aside>
    <section class="right">
      <div class="preview-grid">
        <div><h3>Page 1 - Sketch Plan</h3><div id="page1" class="page sketch-page official-page actual-form"><canvas id="formPage1" class="form-bg"></canvas><div class="diagram-box"><canvas id="diagramCanvas" width="760" height="760"></canvas></div></div></div>
        <div><h3>Page 2 - Statement</h3><div id="page2" class="page statement-page official-page actual-form"><canvas id="formPage2" class="form-bg"></canvas><div id="statementLayer" class="statement-layer"></div></div></div>
      </div>
    </section>
  </main>
  <div id="exportBundle" class="export-bundle"></div>
  <script src="v7-logic.js?v=2"></script>
  <script src="app.js?v=17"></script>
  <script>
    window.addEventListener('load', function () {
      if (!window.pdfjsLib) return;
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      window.pdfjsLib.getDocument('sketch-plan.pdf').promise.then(function (pdf) {
        function renderFormPage(pageNo, canvasId) {
          return pdf.getPage(pageNo).then(function (page) {
            var canvas = document.getElementById(canvasId);
            if (!canvas) return;
            var viewport = page.getViewport({ scale: 2 });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            var ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            return page.render({ canvasContext: ctx, viewport: viewport }).promise;
          });
        }
        renderFormPage(1, 'formPage1');
        renderFormPage(2, 'formPage2');
      }).catch(function () {
        document.querySelectorAll('.actual-form').forEach(function (page) {
          page.classList.add('missing-form');
        });
      });
    });
  </script>
</body>
</html>
